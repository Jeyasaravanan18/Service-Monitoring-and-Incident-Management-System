services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:4173
      MONGO_URI: mongodb://mongo:27017/pulseforge
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      APP_NAME: PulseForge
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE: http://localhost:4000/api
    ports:
      - "4173:4173"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
